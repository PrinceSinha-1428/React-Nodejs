version: "3.8"

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    env_file:
      - .env.db
    ports:
      - "1433:1433"
    volumes:
    - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $$SA_PASSWORD -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: always

  backend:
    build: ./backend
    env_file:
      - .env.docker
    restart: always
    depends_on:
      mssql:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./backend/public/forbidden.html:/usr/share/nginx/html/forbidden.html
    depends_on:
      - backend
      - frontend
    restart: always
    ports:
      - "80:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://nginx:80
    depends_on:
      - nginx
    restart: always

volumes:
  mssql_data: